# VISION CORE V2.9.4 ULTRA — Nginx safety net.
add_header Access-Control-Allow-Origin $http_origin always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
add_header Access-Control-Allow-Headers "Origin, Content-Type, Authorization, X-Requested-With, Accept, Cache-Control, Last-Event-ID, X-Vision-Agent, X-Vision-Request, X-Request-Id" always;
add_header Access-Control-Expose-Headers "Content-Type, X-Vision-Version, X-Request-Id, X-Cors-Status, X-Cors-Origin, X-SSE-Status, X-Pass-Gold" always;
add_header Access-Control-Max-Age 86400 always;
