name: VISION CORE — Validation

on:
  push:
    branches:
      - main
      - "vision-core/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: vision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Sintaxe de todos os serviços críticos
  # ──────────────────────────────────────────────────────────────
  vision-syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Check all service files
        run: |
          echo "=== Verificando sintaxe dos serviços VISION CORE ==="
          node --check server/src/services/missionRunner.js    && echo "✔ missionRunner"
          node --check server/src/services/hermesRca.js        && echo "✔ hermesRca"
          node --check server/src/services/hermesMemory.js     && echo "✔ hermesMemory"
          node --check server/src/services/aegis.js            && echo "✔ aegis"
          node --check server/src/services/fileScanner.js      && echo "✔ fileScanner"
          node --check server/src/services/openclawRouter.js   && echo "✔ openclawRouter"
          node --check server/src/services/escalationPolicy.js && echo "✔ escalationPolicy"
          node --check server/src/services/passGoldEngine.js   && echo "✔ passGoldEngine"
          node --check server/src/services/patchEngine.js      && echo "✔ patchEngine"
          node --check server/src/services/gitness/gitnessService.js   && echo "✔ gitnessService"
          node --check server/src/services/gitness/hybridGitService.js && echo "✔ hybridGitService"
          echo "=== Todas as verificações de sintaxe passaram ==="

  # ──────────────────────────────────────────────────────────────
  # JOB 2: PASS GOLD obrigatório
  # ──────────────────────────────────────────────────────────────
  vision-pass-gold:
    name: PASS GOLD Check
    runs-on: ubuntu-latest
    needs: vision-syntax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run PASS GOLD verification
        run: node scripts/checkPassGold.js

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Self-test (sem API keys externas)
  # ──────────────────────────────────────────────────────────────
  vision-self-test:
    name: Self Test
    runs-on: ubuntu-latest
    needs: vision-syntax
    env:
      NODE_ENV: test
      DB_PATH: .vault/ci.db
      AI_PROVIDER_ORDER: ""
      CONFIDENCE_THRESHOLD: "60"
      PORT: "9999"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run self-test
        working-directory: server
        run: |
          node -e "
            const st = require('./src/self-test');
            st.runSelfTest().then(r => {
              console.log('Self-test: ' + r.passed + '/' + r.total + ' checks');
              if (!r.ok) { console.error('FAIL:', JSON.stringify(r.errors)); process.exit(1); }
              console.log('✔ Self-test passou');
              process.exit(0);
            }).catch(e => { console.error(e.message); process.exit(1); });
          "

  # ──────────────────────────────────────────────────────────────
  # JOB 5: Critical File Guard
  # ──────────────────────────────────────────────────────────────
  vision-critical-guard:
    name: Critical File Guard
    runs-on: ubuntu-latest
    needs: vision-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Check criticalFileGuard syntax
        run: |
          node --check server/src/services/criticalFileGuard.js && echo "✔ criticalFileGuard.js"
          node --check server/src/services/harnessMetrics.js    && echo "✔ harnessMetrics.js"

      - name: Validate critical-files.json
        run: |
          node -e "
            const cfg = require('./server/config/critical-files.json');
            if (cfg.bypass_allowed === true) { console.error('bypass_allowed: true PROIBIDO'); process.exit(1); }
            console.log('critical-files.json: bypass_allowed =', cfg.bypass_allowed);
            console.log('Arquivos protegidos:', cfg.protectedFiles.length);
            console.log('✔ critical-files.json válido');
          "

      - name: Run full checkPassGold (inclui guard checks)
        run: node scripts/checkPassGold.js
  vision-hybrid-check:
    name: Hybrid Config Check
    runs-on: ubuntu-latest
    needs: [vision-syntax]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check hybrid-git.json config
        run: |
          node -e "
            const cfg = require('./server/config/hybrid-git.json');
            console.log('Modo configurado:', process.env.HYBRID_GIT_MODE || 'github_only');
            console.log('Config versão:', cfg.version);
            console.log('Regra PASS GOLD: bypass_allowed =', cfg.pass_gold_rule.bypass_allowed);
            if (cfg.pass_gold_rule.bypass_allowed) {
              console.error('ERRO CRÍTICO: bypass de PASS GOLD não é permitido!');
              process.exit(1);
            }
            console.log('✔ Config híbrido válido');
          "
        env:
          HYBRID_GIT_MODE: ${{ vars.HYBRID_GIT_MODE || 'github_only' }}

  vision-boot-check:
    name: Boot Check + Live SSE/Poll
    runs-on: ubuntu-latest
    needs: [vision-syntax]
    env:
      NODE_ENV: test
      DB_PATH: .vault/ci-boot.db
      AUTO_PR: "false"
      PORT: "9999"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Enforce Node 20 project engines
        run: |
          node -e "for (const f of ['package.json','server/package.json','agent/package.json']) { const p=require('./'+f); if (p.engines.node !== '>=20.0.0 <21.0.0') { console.error(f+' engine inválida: '+p.engines.node); process.exit(1); } } console.log('✔ Node 20 engines OK')"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Boot HTTP check
        working-directory: server
        run: npm run boot-check

      - name: Validate live SSE + polling self-test
        working-directory: server
        env:
          PORT: "9998"
          DB_PATH: .vault/ci-live.db
        run: npm run self-test:live

  vision-docker-compose-check:
    name: Docker Compose Boot Check
    runs-on: ubuntu-latest
    needs: [vision-boot-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start Docker stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..40}; do
            if docker compose exec -T api npm run healthcheck; then
              echo "✔ API healthcheck OK"
              exit 0
            fi
            sleep 3
          done
          docker compose logs --tail=200 api
          exit 1

      - name: Validate boot-check in container
        run: docker compose exec -T api npm run boot-check

      - name: Validate SSE + polling in container
        run: docker compose exec -T api npm run self-test:live

      - name: Tear down
        if: always()
        run: docker compose down -v
