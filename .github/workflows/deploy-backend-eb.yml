name: Deploy Backend — AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docs/spec-library/**"
      - "docs/HERMES_FINE_TUNING_DATASET.md"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      EB_APP: ${{ vars.AWS_EB_APPLICATION }}
      EB_ENV: ${{ vars.AWS_EB_ENVIRONMENT }}
      S3_BUCKET: ${{ vars.AWS_S3_DEPLOY_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Syntax check before deploy
        run: node --check backend/server.js

      - name: Generate deployment package
        run: |
          # Copy runtime docs into backend so EB has access at runtime
          cp -r docs/spec-library backend/spec-library
          mkdir -p backend/docs
          cp docs/HERMES_FINE_TUNING_DATASET.md backend/docs/HERMES_FINE_TUNING_DATASET.md
          cd backend
          zip -r ../deploy.zip . \
            --exclude "*.test.*" \
            --exclude "node_modules/*" \
            --exclude ".env*" \
            --exclude "*.log"
          echo "Package size: $(du -sh ../deploy.zip | cut -f1)"
          echo "Spec library files: $(ls spec-library/*.json | wc -l)"
          unzip -l ../deploy.zip docs/HERMES_FINE_TUNING_DATASET.md | grep HERMES_FINE_TUNING_DATASET.md

      - name: Upload bundle to S3
        run: |
          VERSION_LABEL="v${{ github.run_number }}-${{ github.sha }}"
          S3_KEY="${VERSION_LABEL}.zip"
          aws s3 cp deploy.zip "s3://${S3_BUCKET}/${S3_KEY}"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> $GITHUB_ENV
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APP}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket="${S3_BUCKET}",S3Key="${{ env.S3_KEY }}" \
            --auto-create-application

      - name: Deploy version to environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APP}" \
            --environment-name "${EB_ENV}" \
            --version-label "${{ env.VERSION_LABEL }}"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for environment to become Ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${EB_APP}" \
            --environment-names "${EB_ENV}"

      - name: Post-deploy health check
        continue-on-error: true
        run: |
          sleep 15
          curl -fsS "${{ secrets.EB_BACKEND_URL }}/api/health" > /dev/null
          echo "Backend health OK"
