name: Deploy Backend — AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EB_APP: ${{ vars.AWS_EB_APPLICATION }}
      EB_ENV: ${{ vars.AWS_EB_ENVIRONMENT }}
      S3_BUCKET: ${{ vars.AWS_S3_DEPLOY_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Syntax check before deploy
        run: node --check backend/server.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate deployment package
        run: |
          cd backend
          zip -r ../deploy.zip . \
            --exclude "*.test.*" \
            --exclude "node_modules/*" \
            --exclude ".env*" \
            --exclude "*.log"
          echo "Package size: $(du -sh ../deploy.zip | cut -f1)"

      - name: Upload bundle to S3
        run: |
          VERSION_LABEL="v${{ github.run_number }}-${{ github.sha }}"
          S3_KEY="${{ vars.AWS_EB_APPLICATION }}/${VERSION_LABEL}.zip"
          aws s3 cp deploy.zip "s3://${{ vars.AWS_S3_DEPLOY_BUCKET }}/${S3_KEY}"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> $GITHUB_ENV
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.AWS_EB_APPLICATION }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket="${{ vars.AWS_S3_DEPLOY_BUCKET }}",S3Key="${{ env.S3_KEY }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Deploy version to environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ vars.AWS_EB_APPLICATION }}" \
            --environment-name "${{ vars.AWS_EB_ENVIRONMENT }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for environment to become Ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ vars.AWS_EB_APPLICATION }}" \
            --environment-names "${{ vars.AWS_EB_ENVIRONMENT }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Post-deploy health check
        continue-on-error: true
        run: |
          sleep 15
          curl -fsS "${{ secrets.EB_BACKEND_URL }}/api/health" > /dev/null
          echo "Backend health OK"
