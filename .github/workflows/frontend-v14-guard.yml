name: Frontend V14 Guard

on:
  pull_request:
    paths:
      - "frontend/**"
      - "tools/sddf-front-guard.mjs"
      - "docs/VISUAL_GOLD_HARNESS_MANIFEST.json"
      - "tools/visual-gold-harness-lock.mjs"
      - "tools/frontend-visual-lock.mjs"
      - ".github/workflows/frontend-v14-guard.yml"
  workflow_dispatch:

jobs:
  frontend-v14-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect GOLD visual snapshot
        id: gold_snapshot
        shell: bash
        run: |
          if [ -f "docs/VISUAL_GOLD_HARNESS_MANIFEST.json" ]; then
            echo "gold_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "GOLD visual snapshot detected. V14 clean guard is bypassed for this restoration PR."
          else
            echo "gold_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run V14 front guard
        if: steps.gold_snapshot.outputs.gold_snapshot != 'true'
        run: node tools/sddf-front-guard.mjs

      - name: GOLD snapshot accepted
        if: steps.gold_snapshot.outputs.gold_snapshot == 'true'
        run: |
          node tools/visual-gold-harness-lock.mjs
          node tools/frontend-visual-lock.mjs
          node tools/sddf-front-guard.mjs
          echo "Frontend V14 Guard bypassed because this PR restores the approved GOLD visual snapshot."
