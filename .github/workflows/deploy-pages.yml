# §75 — Deploy migrado para GitLab CI (ver .gitlab-ci.yml)
# GitHub mantido como backup; job desabilitado com if: false
# Para reativar: remover "if: false" do job deploy abaixo
name: Deploy to Cloudflare Pages [DISABLED — see .gitlab-ci.yml]

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  deploy:
    if: false  # §75 — desabilitado; deploy via GitLab CI
    runs-on: ubuntu-latest
    name: Deploy frontend to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory (exclude downloads/)
        run: |
          cp -r frontend /tmp/vision-pages-deploy
          rm -rf /tmp/vision-pages-deploy/downloads

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/vision-pages-deploy --project-name=visioncoreai --branch=main
