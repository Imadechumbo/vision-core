name: Vision Core CI — PASS GOLD Gate

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "fix/**"
      - "v5-go-agent-bridge"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  syntax-check:
    name: 🔍 Syntax & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node syntax checks
        run: |
          node --check backend/server.js
          node --check backend/src/runtime/goRunner.js

  build:
    name: 📦 Build & Artifact
    runs-on: ubuntu-latest
    needs:
      - syntax-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-core/go.mod

      - name: Go test
        working-directory: go-core
        run: go test ./...

      - name: Build vision-core binary
        working-directory: go-core
        run: go build -o ../bin/vision-core.exe ./cmd/vision-core

      - name: Upload vision-core binary
        uses: actions/upload-artifact@v4
        with:
          name: vision-core-exe-${{ github.sha }}
          path: bin/vision-core.exe
          if-no-files-found: error
          retention-days: 30

  vision-core-pipeline:
    name: 🧠 Vision Core — Hermes RCA + Patch + PASS GOLD
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-core/go.mod

      - name: Build vision-core binary
        working-directory: go-core
        run: go build -o ../bin/vision-core.exe ./cmd/vision-core

      - name: Run Hermes mission and validate PASS GOLD
        shell: bash
        run: |
          output=$(./bin/vision-core.exe mission --root "." --input "CORS origin blocked")
          echo "$output"
          printf '%s' "$output" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["status"]=="GOLD"; assert d["pass_gold"] is True; assert d["engine"]=="go-safe-core"; assert d["hermes_enabled"] is True; assert d["transaction_mode"] is True; print("PASS GOLD")'