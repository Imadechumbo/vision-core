name: Vision Core — Stress Test CI (V1–V4 + SF + FP)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'   # domingo 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  stress-tests:
    name: 🧪 Stress Tests V1–V4 + SF + FP
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TECHNETGAME }}
          fetch-depth: 2   # §68 race fix: HEAD~1 precisa de ≥2 commits

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Wait for EB backend to be healthy
        timeout-minutes: 15
        run: |
          BACKEND_URL="http://vision-core-prod.eba-pdk6anxy.us-east-1.elasticbeanstalk.com"
          HEALTH_URL="${BACKEND_URL}/api/health"
          MAX_ATTEMPTS=30
          SLEEP_SEC=30
          # §68 fix: 3 confirmações consecutivas para evitar race com rolling deploy EB
          CONSECUTIVE_REQUIRED=3
          consecutive=0
          echo "Aguardando EB saudável (${CONSECUTIVE_REQUIRED} confirmações consecutivas): ${HEALTH_URL}"
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${HEALTH_URL}" 2>/dev/null || echo "000")
            echo "  tentativa ${i}/${MAX_ATTEMPTS} — HTTP ${STATUS} (consecutivas OK: ${consecutive}/${CONSECUTIVE_REQUIRED})"
            if [ "${STATUS}" = "200" ]; then
              consecutive=$((consecutive + 1))
              if [ "$consecutive" -ge "$CONSECUTIVE_REQUIRED" ]; then
                echo "✅ EB estável (${CONSECUTIVE_REQUIRED}x HTTP 200). Iniciando testes."
                exit 0
              fi
              sleep 5
            else
              consecutive=0
              if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
                sleep ${SLEEP_SEC}
              fi
            fi
          done
          echo "❌ EB não ficou estável após tentativas. Abortando."
          exit 1

      - name: Wait for EB deploy to settle (backend changes only)
        run: |
          # §68 race fix: quando backend/ muda, o predeploy hook (dnf+pip) estende a
          # janela de deployment. O health check passa na versão OLD e os testes
          # começam enquanto o EB ainda está promovendo a nova versão → ECONNREFUSED.
          # Solução: 120s extra apenas quando este commit altera backend/.
          BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'backend/' 2>/dev/null | head -1 || echo "")
          if [ -n "$BACKEND_CHANGED" ]; then
            echo "⚠️  backend/ alterado — aguardando 300s para deploy EB estabilizar antes dos testes..."
            echo "   (Arquivo alterado: $BACKEND_CHANGED)"
            echo "   (§68 hook instala semgrep via venv: dnf ~35s + venv + pip ~3min)"
            sleep 300
            echo "✅ Wait de estabilização concluído (300s)."
          else
            echo "✅ Nenhuma mudança em backend/ — sem wait extra."
          fi

      - name: Run Stress Test V1
        continue-on-error: true
        run: node scripts/stress-test-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run Stress Test V2
        continue-on-error: true
        run: node scripts/stress-test-v2-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run Stress Test V3
        continue-on-error: true
        run: node scripts/stress-test-v3-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run Stress Test V4
        continue-on-error: true
        run: node scripts/stress-test-v4-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run Stress Test SF
        continue-on-error: true
        run: node scripts/stress-test-sf-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Run Stress Test FP (Falso Positivo)
        continue-on-error: true
        run: node scripts/stress-test-fp-vision-core.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TECHNETGAME }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Aggregate results and gate
        id: aggregate
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync, mkdirSync } from 'fs';
          import { join } from 'path';

          const ROOT = process.cwd();
          const docsDir = join(ROOT, 'docs');

          // Map: suite label → json filename
          const SUITES = [
            { label: 'V1',  file: 'STRESS-TEST-RESULTS.json',     expected: 10 },
            { label: 'V2',  file: 'STRESS-TEST-V2-RESULTS.json',  expected: 15 },
            { label: 'V3',  file: 'STRESS-TEST-V3-RESULTS.json',  expected: 15 },
            { label: 'V4',  file: 'STRESS-TEST-V4-RESULTS.json',  expected: 15 },
            { label: 'SF',  file: 'STRESS-TEST-SF-RESULTS.json',  expected: 15 },
            { label: 'FP',  file: 'STRESS-TEST-FP-RESULTS.json',  expected: 10 },
          ];

          let totalPass = 0;
          let totalFail = 0;
          const rows    = [];
          const failures = [];

          for (const suite of SUITES) {
            const filePath = join(docsDir, suite.file);
            let pass = 0, fail = 0;
            try {
              const raw  = readFileSync(filePath, 'utf8');
              const data = JSON.parse(raw);
              const cenarios = data.cenarios || data.results || data.resultados || [];
              pass = cenarios.filter(c => c.passou).length;
              fail = cenarios.filter(c => !c.passou).length;

              if (fail > 0) {
                const failList = cenarios
                  .filter(c => !c.passou)
                  .map(c => `    ❌ ${c.id} — ${c.descricao}`);
                failures.push(`[${suite.label}] ${fail} FAIL:\n${failList.join('\n')}`);
              }
            } catch (e) {
              fail = suite.expected;
              failures.push(`[${suite.label}] JSON ausente ou inválido: ${e.message}`);
            }
            totalPass += pass;
            totalFail += fail;
            rows.push(`| ${suite.label} | ${pass} | ${fail} | ${pass + fail} |`);
          }

          const total    = totalPass + totalFail;
          const taxa     = total > 0 ? Math.round((totalPass / total) * 100) : 0;
          const now      = new Date().toISOString();
          const sha      = process.env.GITHUB_SHA || 'local';
          const run      = process.env.GITHUB_RUN_NUMBER || '—';
          const ref      = process.env.GITHUB_REF_NAME || '—';

          const status   = totalFail === 0 ? '✅ PASS GOLD' : `❌ FAIL (${totalFail} cenários)`;

          const md = [
            `# Vision Core — CI Last Run`,
            ``,
            `**Data:** ${now}`,
            `**Status:** ${status}`,
            `**Total:** ${totalPass}/${total} PASS (${taxa}%)`,
            `**Run:** #${run} | **Ref:** ${ref} | **SHA:** ${sha.slice(0,8)}`,
            ``,
            `## Resultados por suíte`,
            ``,
            `| Suíte | PASS | FAIL | Total |`,
            `|-------|------|------|-------|`,
            ...rows,
            `| **Total** | **${totalPass}** | **${totalFail}** | **${total}** |`,
            ``,
          ].join('\n');

          mkdirSync(docsDir, { recursive: true });
          writeFileSync(join(docsDir, 'CI-LAST-RUN.md'), md, 'utf8');

          console.log('\n' + md);

          if (failures.length > 0) {
            console.log('\n══ CENÁRIOS COM FALHA ══');
            failures.forEach(f => console.log(f));
          }

          // Exit code gate
          if (totalFail > 0) {
            console.error(`\n🚨 GATE FAIL: ${totalFail} cenário(s) reprovado(s). Esperado 0 falhas.`);
            process.exit(1);
          } else {
            console.log(`\n🏆 GATE PASS: ${totalPass}/${total} PASS GOLD`);
          }
          EOF

      - name: Commit CI-LAST-RUN.md
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CI-LAST-RUN.md docs/STRESS-TEST-RESULTS.json docs/STRESS-TEST-*-RESULTS.json docs/STRESS-TEST-*-RESULTS.md || true
          git diff --cached --quiet || git commit -m "ci: auto-update CI-LAST-RUN + RESULTS [skip ci]"
          git push || true

      - name: Upload RESULTS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true   # quota exhaustion must not block CI
        with:
          name: stress-test-results-${{ github.run_number }}
          path: docs/STRESS-TEST-*-RESULTS.*
          if-no-files-found: warn
          retention-days: 3
