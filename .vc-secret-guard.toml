# Policy do vc-secret-guard para o repositório Vision Core.
# Ver vc-secret-guard/README.md para o formato completo e a semântica exata
# de "*" (glob simples — casa qualquer coisa, incluindo "/" adicionais,
# quando está no final do padrão).
#
# Construída durante o dogfood da Fase 1 (docs/VC_SECRET_GUARD_RUST_SPEC.md
# §10) contra o próprio repositório. Cada entrada abaixo foi revisada
# individualmente antes de entrar aqui — nenhuma foi suprimida "no escuro".
# Ver docs/CURRENT_HANDOFF.md para o relato completo dessa revisão.
#
# NÃO incluído de propósito (fica visível, não suprimido — ver HANDOFF):
# frontend/assets/vision-core-clean-runtime.js contém a senha hardcoded
# 'vc-user-auto' (fluxo de conta demo automática) — achado real, não falso
# positivo, deixado para decisão humana explícita. (Um comentário de código
# em tools/_archive/ cita a mesma string, mas cai dentro do allowlist geral
# de tools/_archive/* abaixo — é redundante com o achado já visível aqui,
# não esconde nenhuma informação nova.)

[allowlist]
paths = [
  # Fixtures/testes/spec do próprio vc-secret-guard — sintéticos por
  # design, documentados em vc-secret-guard/tests/fixtures/README.md.
  "vc-secret-guard/tests/fixtures/*",
  "vc-secret-guard/src/categories.rs",
  "vc-secret-guard/Cargo.lock",
  "docs/VC_SECRET_GUARD_RUST_SPEC.md",

  # Fixtures/testes pré-existentes de OUTRAS partes do projeto, já
  # desenhados para conter segredos sintéticos (testam a própria detecção
  # de segredos do produto) — revisados individualmente, não são leaks.
  "_fixture_stress/*",
  "go-core/internal/patcher/operations_test.go",
  "go-core/internal/planning/rule_mapping_test.go",
  "stress-test-vision-core.cjs",
  "scripts/stress-test-sf-vision-core.js",
  "tools/tests/provider-vault-endpoints.test.mjs",

  # Depoimentos já revisados nesta mesma sessão em about.html/landing.html
  # (valores ofuscados/fictícios de sessões anteriores, ex. sk-prod-abc123xyz789).
  "frontend/about.html",
  "frontend/landing.html",

  # Interpolação de variável de CI, não um literal — ver categories.rs
  # (looks_like_variable_reference) para o caso comum; este arquivo
  # específico foi revisado à mão porque usa um padrão que o regex
  # ilustrativo ainda não cobre 100%.
  ".github/workflows/mirror-to-gitlab.yml",

  # Ruído de alta entropia: identificadores de código/build, não segredos.
  # .vision-snapshots/*: hash SHA-256 de conteúdo (campo "hash" de backup
  # de snapshot do Vision Agent) — verificado lendo um arquivo de exemplo,
  # não é credencial, é hash de integridade de arquivo.
  ".vision-snapshots/*",
  "go-core/internal/*",
  "go-core/cmd/*",
  "tools/_archive/*",
  "tools/tests/*",
  "tools/hermes/*",
  "tools/pi-harness.mjs",
  "tools/real-validation/*",
  "frontend/assets/vision-core-bundle.js",
  "frontend/assets/vision-core-clean-state.js",
  # vision-core-clean-runtime.js NAO esta aqui de proposito - contem a
  # senha hardcoded 'vc-user-auto' (achado real, nao suprimido, ver topo
  # deste arquivo) junto com ruido de entropia. Suprimir por caminho
  # esconderia os dois juntos; melhor deixar o arquivo inteiro visivel.
  "frontend/index.html",
  "tests/e2e/*",
  "package-lock.json",
  "backend/package-lock.json",
  "desktop-agent/package-lock.json",
  "SDDF_SPEC.md",
  "CLAUDE_HISTORY.md",
  "docs/STRESS-TEST-ARCH-E2E-RESULTS.json",
  "docs/HERMES_MISSION_SUPERVISOR.md",
  "docs/PI_HARNESS_AUTONOMOUS_MISSION_RUNNER.md",
]
